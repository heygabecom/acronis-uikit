spec_version: '1.0'
component: Chip

# References only. Values live in @acronis-platform/tokens-pd (generated from
# @acronis-platform/design-tokens) and resolve per brand/theme at paint time.
# Chip binds the dedicated `--ui-chip-*` tier: box geometry, the
# idle/hover/active box fill + border colors, the per-variant label color, and
# the icon color/size. The focus ring reuses the shared `--ui-focus-primary`.
source: '@acronis-platform/tokens-pd'

tokens:
  # ── Geometry (root) ──
  - name: --ui-chip-global-box-height
    affects: root
  - name: --ui-chip-global-box-gap
    affects: root
  - name: --ui-chip-global-box-padding-x
    affects: root
  - name: --ui-chip-global-box-width-min
    affects: root
  - name: --ui-chip-global-border-radius
    affects: root
  - name: --ui-chip-global-border-width
    affects: root

  # ── Box fill (idle / hover / active) ──
  - name: --ui-chip-global-box-color-idle
    affects: root
  - name: --ui-chip-global-box-color-hover
    affects: root
  - name: --ui-chip-global-box-color-active
    affects: root

  # ── Border color (idle / hover / active) ──
  - name: --ui-chip-global-border-color-idle
    affects: root
  - name: --ui-chip-global-border-color-hover
    affects: root
  - name: --ui-chip-global-border-color-active
    affects: root

  # ── Label (per variant) ──
  - name: --ui-chip-removable-label-color
    affects: label
  - name: --ui-chip-selectable-label-color
    affects: label

  # ── Icon (leading icon + remove glyph) ──
  - name: --ui-chip-global-icon-color
    affects: icon
  - name: --ui-chip-global-icon-size
    affects: icon

  # ── Focus ring (shared) ──
  - name: --ui-focus-primary
    affects: root
