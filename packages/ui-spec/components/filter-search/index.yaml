spec_version: '1.0'
component: FilterSearch
name: filter-search
status: ready
category: layout
description: >-
  A composable toolbar for data tables: arranges a search field, optional
  filters button, optional tenant/scope switcher, and trailing action buttons
  in a single horizontal row. Pure layout — no dedicated token tier; child
  components (Search, ButtonMenu, Select) bring their own tokens.
  `FilterSearchFilters` (the filter popover: trigger + form + Reset/Cancel/
  Apply) and `FilterSearchAppliedFilters` (the removable-chip row + top-level
  "Reset filters") are design-pending additions — no Figma node yet, unlike
  the FilterSearch node itself (see `figma:` below, which covers only the
  root toolbar layout).
since: 0.55.0
dependencies:
  components:
    - Search
    - ButtonMenu
    - Select
    - Button
    - Chip
    - Popover
    - DataTableToolbar
figma:
  node: '3897-7681'
  codeConnect: packages/ui-react/src/components/ui/filter-search/filter-search.figma.tsx
