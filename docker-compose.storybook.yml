# docker-compose.storybook.yml
services:
  storybook:
    build:
      context: .
      dockerfile: Dockerfile.storybook
    image: shadcn-uikit-storybook
    ports:
      - "6006:6006"
    # Serve the pre-built static output from the host — no build step in Docker
    volumes:
      - ./packages/legacy/ui/storybook-static:/app/packages/legacy/ui/storybook-static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6006 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.storybook
    image: shadcn-uikit-storybook
    command: pnpm exec test-storybook --url http://storybook:6006 --maxWorkers=4
    depends_on:
      storybook:
        condition: service_healthy
    volumes:
      - ./packages/legacy/ui/test/__snapshots__:/app/packages/legacy/ui/test/__snapshots__
